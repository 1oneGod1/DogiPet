name: Build and test

on:
  pull_request:
  push:
    branches-ignore:
      - main
    tags-ignore:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python scripts/draw_sprites.py
      - run: python scripts/generate_assets.py
      - run: python -m unittest discover -s tests -v
      - run: python -m py_compile dogi.py updater.py dogi_hook.py notes_ai.py meeting_ai.py meeting_recorder.py local_transcriber.py codex_integration.py dogi_assistant.py calendar_integration.py secure_store.py
      - run: python -m PyInstaller --noconfirm --clean DogiPet.spec
      - run: dist\DogiPet.exe --local-ai-smoke-test
      - run: dist\DogiPet.exe --smoke-test
      - uses: actions/upload-artifact@v4
        with:
          name: DogiPet-Windows
          path: dist/DogiPet.exe
